  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {

    --text: #111110;
    --muted: #888884;
    --accent: #2351d4;
    --accent-light: #eef1fc;
    --sidebar-w: 300px;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'Space Grotesk', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }

  /* SIDEBAR */

    top: 0; left: 0;
    width: var(--sidebar-w);
    height: 100vh;
    background: var(--text);
    color: #f8f8f6;
    display: flex;
    flex-direction: column;
    padding: 40px 32px;
    z-index: 100;

    font-size: 22px;
    font-weight: 600;
    line-height: 1.25;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .sidebar-title {
    font-size: 11px;
    font-weight: 400;
    color: #9a9a96;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 36px;
    line-height: 1.6;
  }

  .nav-label {

    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #555552;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .nav-link {

    align-items: center;
    gap: 10px;
    padding: 9px 0;
    color: #9a9a96;
    font-size: 13px;

    cursor: pointer;
    border-bottom: 1px solid #1e1e1c;

  .nav-link:hover, .nav-link.active { color: #f8f8f6; }
  .nav-link .dot {

    transition: background 0.15s;
    flex-shrink: 0;
  }
  .nav-link:hover .dot, .nav-link.active .dot { background: var(--accent); }

  .sidebar-contacts {
    margin-top: auto;
    padding-top: 24px;
    border-top: 1px solid #1e1e1c;
  }

  .contact-item {
    font-size: 11px;
    color: #666663;
    margin-bottom: 10px;
    line-height: 1.4;
  }
  .contact-item a { color: #888884; text-decoration: none; }
  .contact-item a:hover { color: #f8f8f6; }
  .contact-label { color: #444441; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px; }

  .lang-toggle {
    display: flex;
    gap: 0;
    margin-top: 24px;
    background: #1a1a18;
    border-radius: 4px;
    overflow: hidden;
  }
  .lang-btn {
    flex: 1;
    padding: 7px;
    font-size: 11px;
    font-family: var(--font-mono);
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    border: none;
    background: transparent;
    color: #555552;
    transition: all 0.2s;
  }
  .lang-btn.active {
    background: var(--accent);
    color: #fff;
  }

  /* MAIN CONTENT */
  .main {
    margin-left: var(--sidebar-w);
    padding: 40px 48px;
    min-height: 100vh;
  }

  /* HERO STRIP */
  .hero {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 40px 48px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: center;
  }
  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 12px;
    font-family: var(--font-mono);
  }
  .hero-headline {
    font-family: var(--font-display);
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 16px;
  }
  .hero-bio {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.75;
    max-width: 560px;
    font-weight: 300;
  }
  .hero-actions {

    flex-direction: column;
    gap: 10px;
    align-items: center;
  }
  .hero-photo {
    width: 120px;
    height: 140px;
    border-radius: 6px;
    object-fit: cover;
    object-position: center top;
    display: block;

  .btn-primary {

    background: var(--accent);
    color: white;
    border: none;
    border-radius: 5px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;

  .btn-secondary {

    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 5px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.15s;
  }
  .btn-secondary:hover { border-color: var(--text); }

  .dashboard-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  .full-width { grid-column: 1 / -1; }

  /* PANELS */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px 32px;
    animation: fadeUp 0.5s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);

  .tag.dev {

    color: #92620a;

  .exp-bullets {

    line-height: 1.65;
    padding-left: 14px;
    position: relative;
    margin-bottom: 4px;

  .exp-bullets li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--border);
  }

  .edu-item {
    padding: 16px 0;

  .edu-item:first-child { padding-top: 0; }

    font-weight: 600;
    margin-bottom: 3px;

    font-size: 11px;

  .modal-overlay {

    display: flex;
    align-items: center;
    justify-content: center;

  .modal {
    background: var(--panel);
    border-radius: 10px;
    padding: 40px;
    width: 480px;
    max-width: 90vw;

  .modal-title {

    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;

  .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .modal-close {
    position: absolute;
    top: 16px; right: 20px;
    background: none; border: none;

  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;

    border-radius: 5px;
    font-family: var(--font-body);
    font-size: 13px;
    background: var(--bg);
    color: var(--text);

  }
  .form-input:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 100px; }
  .form-success {

  .form-success-icon {

  .form-success-title { font-family: var(--font-display); font-size: 22px; margin-bottom: 8px; }
  .form-success-text { font-size: 13px; color: var(--muted); }

    bottom: 24px; right: 24px;

    color: #f8f8f6;
    border-radius: 10px;
    padding: 20px 24px;
    width: 240px;
    z-index: 300;

  .tweaks-title {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;

  .tweak-row { margin-bottom: 14px; }
  .tweak-label { font-size: 11px; color: #888884; margin-bottom: 6px; }
  .tweak-options { display: flex; gap: 6px; flex-wrap: wrap; }
  .tweak-opt {

    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    border: 1px solid #2a2a28;
    background: transparent;
    color: #888884;
    font-family: var(--font-mono);
    transition: all 0.15s;
  }
  .tweak-opt.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  @media (max-width: 900px) {
    :root { --sidebar-w: 0px; }
    .sidebar { transform: translateX(-100%); }
    .main { margin-left: 0; padding: 20px; }
    .dashboard-grid { grid-template-columns: 1fr; }
    .hero { grid-template-columns: 1fr; }
    .hero-actions { align-items: flex-start; flex-direction: row; }
  }
</style>

      bullets: [
      "Analytical reporting of KPIs (occupancy rate, average ticket, NPS) with periodic reports for management.",
      "Resource planning and optimisation with data analysis to reduce operational inefficiencies.",
      "Collaboration with commercial and technical teams on package and partnership profitability analysis."]

    },
    {

    },
    {

      bullets: [
      "Support for operational control and Group compliance.",

    },
    {

      company: "Doce Viver, Lda",
      period: "Jul – Oct 2017",
      bullets: [
      "Invoicing (Invoices, Credit Notes, Receipts, SAF-T) in Centralgest and supplier management."]

    }],

    education: [
    {
      degree: "MSc Economics — Financial Track",
      school: "Faculty of Economics, University of Coimbra",
      period: "2025 – present",
      details: "Expected 2027 · Financial Markets · Applied Econometrics · Risk Management · Corporate Finance"
    },
    {
      degree: "Postgraduate in Psychogerontology",

    langHeaders: ["Language", "Reading/Listening", "Speaking", "Writing"],
    contactTitle: "Let's Talk",
    contactSub: "Send a message and I'll get back to you shortly.",
    formLabels: { name: "Name", email: "Email", message: "Message", send: "Send Message" },
    successMsg: { title: "Message sent!", text: "Thank you for reaching out. I'll reply soon." }
  }
};

function App() {
  const [lang, setLang] = useState(() => localStorage.getItem('cv_lang') || 'PT');
  const [showModal, setShowModal] = useState(false);
  const [formState, setFormState] = useState({ name: '', email: '', message: '' });
  const [submitted, setSubmitted] = useState(false);
  const [activeSection, setActiveSection] = useState(0);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);
  const sectionRefs = useRef([]);
  const c = content[lang];

  useEffect(() => {
    localStorage.setItem('cv_lang', lang);
  }, [lang]);

  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--accent', tweaks.accentColor);
    root.style.setProperty('--accent-light', tweaks.accentColor + '18');
    const fs = tweaks.fontSize === 'large' ? '1.08' : tweaks.fontSize === 'small' ? '0.93' : '1';
    root.style.fontSize = fs + 'rem';
  }, [tweaks]);

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  const scrollTo = (id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  const handleDownload = () => window.print();

  const handleSubmit = (e) => {
    e.preventDefault();
    setSubmitted(true);
  };

  const sectionIds = ['profile', 'skills', 'experience', 'education', 'certs', 'langs'];

  return (
    <>
      {/* SIDEBAR */}
      <aside className="sidebar">
        <div className="sidebar-name">David Dionísio Coelho</div>
        <div className="sidebar-title">
          {lang === 'PT' ? 'Mestrando em Economia\nFinancial Track · FEUC' : 'MSc Economics\nFinancial Track · FEUC'}
        </div>
        <div className="lang-toggle" style={{marginBottom:'28px', marginTop:'-8px'}}>
          <button className={`lang-btn ${lang === 'PT' ? 'active' : ''}`} onClick={() => setLang('PT')}>PT</button>
          <button className={`lang-btn ${lang === 'EN' ? 'active' : ''}`} onClick={() => setLang('EN')}>EN</button>
        </div>
        <div className="nav-label">{lang === 'PT' ? 'Secções' : 'Sections'}</div>
        {c.nav.map((label, i) =>
        <a key={i} className={`nav-link ${activeSection === i ? 'active' : ''}`}
        onClick={() => {scrollTo(sectionIds[i]);setActiveSection(i);}}>
            <span className="dot" />
            {label}
          </a>
        )}
        <div className="sidebar-contacts">
          <div className="contact-item">
            <div className="contact-label">Email</div>
            <a href="mailto:davidcoelho.dc@gmail.com">davidcoelho.dc@gmail.com</a>
          </div>
          <div className="contact-item">
            <div className="contact-label">Tel</div>
            (+351) 935 891 401
          </div>
          <div className="contact-item">
            <div className="contact-label">LinkedIn</div>
            <a href="https://linkedin.com/in/david-d-coelho" target="_blank">david-d-coelho</a>
          </div>
          <div className="contact-item">
            <div className="contact-label">{lang === 'PT' ? 'Localização' : 'Location'}</div>
            Coimbra, Portugal
          </div>
        </div>
      </aside>

      {/* MAIN */}
      <main className="main">
        {/* HERO */}
        <section id="profile" className="hero panel" style={{ animationDelay: '0ms' }}>
          <div>
            <div className="hero-eyebrow">{c.eyebrow}</div>
            <div className="hero-headline" style={{ whiteSpace: 'pre-line' }}>{c.headline}</div>
            <div className="hero-bio">{c.bio}</div>
          </div>
          <div className="hero-actions">
            <img className="hero-photo" src="uploads/eu_cropped.png" alt="David Dionísio Coelho" style={{ width: "120px", margin: "0px", objectFit: "cover" }} />
            <button className="btn-primary" onClick={handleDownload}>↓ {c.downloadBtn}</button>
            <button className="btn-secondary" onClick={() => {setShowModal(true);setSubmitted(false);}}>{c.contactBtn}</button>
          </div>
        </section>

        {/* SKILLS — full width */}
        <section id="skills">
          <div className="panel full-width" style={{ animationDelay: '60ms' }}>
            <div className="panel-header">
              <span className="panel-title">{c.sections.skills}</span>
              <span className="panel-count">05 {lang === 'PT' ? 'categorias' : 'categories'}</span>
            </div>
            {c.skillCategories.map((cat, i) =>
            <div className="skill-category" key={i}>
                <div className="skill-cat-label">{cat.label}</div>
                <div className="skill-tags">
                  {cat.tags.map((t, j) =>
                <span key={j} className={`tag ${cat.type === 'accent' ? 'accent' : cat.type === 'dev' ? 'dev' : ''}`}>{t}</span>
                )}
                </div>
              </div>
            )}
          </div>
        </section>

        {/* EXPERIENCE + EDUCATION side by side */}
        <div className="dashboard-grid">
          <section id="experience">
            <div className="panel" style={{ animationDelay: '120ms' }}>
              <div className="panel-header">
                <span className="panel-title">{c.sections.experience}</span>
                <span className="panel-count">05</span>
              </div>
              {c.experience.map((e, i) =>
              <div key={i} className="exp-item">
                  <div className="exp-meta">
                    <div className="exp-role">{e.role}</div>
                    <div className="exp-period">{e.period}</div>
                  </div>
                  <div className="exp-company">{e.company}</div>
                  {e.bullets.length > 0 &&
                <ul className="exp-bullets">
                      {e.bullets.map((b, j) => <li key={j}>{b}</li>)}
                    </ul>
                }
                </div>
              )}
            </div>
          </section>

          <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
            {/* EDUCATION */}
            <section id="education">
              <div className="panel" style={{ animationDelay: '160ms' }}>
                <div className="panel-header">
                  <span className="panel-title">{c.sections.education}</span>
                  <span className="panel-count">03</span>
                </div>
                {c.education.map((e, i) =>
                <div key={i} className="edu-item">
                    <div className="edu-degree">{e.degree}</div>
                    <div className="edu-school">{e.school} · {e.period}</div>
                    <div className="edu-details">{e.details}</div>
                  </div>
                )}
              </div>
            </section>

            {/* CERTS */}
            <section id="certs">
              <div className="panel" style={{ animationDelay: '200ms' }}>
                <div className="panel-header">
                  <span className="panel-title">{c.sections.certs}</span>
                  <span className="panel-count">03</span>
                </div>
                {c.certs.map((cert, i) =>
                <div key={i} className="cert-item">
                    <div>
                      <div className="cert-name">{cert.name}</div>
                      <div className="cert-detail">{cert.detail}</div>
                    </div>
                    <div className="cert-year">{cert.year}</div>
                  </div>
                )}
              </div>
            </section>

            {/* LANGUAGES */}
            <section id="langs">
              <div className="panel" style={{ animationDelay: '240ms' }}>
                <div className="panel-header">
                  <span className="panel-title">{c.sections.langs}</span>
                  <span className="panel-count">03</span>
                </div>
                <table className="lang-table">
                  <thead>
                    <tr>{c.langHeaders.map((h, i) => <th key={i}>{h}</th>)}</tr>
                  </thead>
                  <tbody>
                    {c.langs.map((l, i) =>
                    <tr key={i}>
                        <td>{l.lang}</td>
                        <td><span className={`lang-badge ${l.native ? 'native' : ''}`}>{l.comp}</span></td>
                        <td><span className={`lang-badge ${l.native ? 'native' : ''}`}>{l.oral}</span></td>
                        <td><span className={`lang-badge ${l.native ? 'native' : ''}`}>{l.written}</span></td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </section>
          </div>
        </div>
      </main>

      {/* CONTACT MODAL */}
      {showModal &&
      <div className="modal-overlay" onClick={(e) => e.target === e.currentTarget && setShowModal(false)}>
          <div className="modal">
            <button className="modal-close" onClick={() => setShowModal(false)}>×</button>
            {submitted ?
          <div className="form-success">
                <div className="form-success-icon">✓</div>
                <div className="form-success-title">{c.successMsg.title}</div>
                <div className="form-success-text">{c.successMsg.text}</div>
              </div> :

          <>
                <div className="modal-title">{c.contactTitle}</div>
                <div className="modal-sub">{c.contactSub}</div>
                <form onSubmit={handleSubmit}>
                  <div className="form-group">
                    <label className="form-label">{c.formLabels.name}</label>
                    <input className="form-input" required value={formState.name}
                onChange={(e) => setFormState({ ...formState, name: e.target.value })} />
                  </div>
                  <div className="form-group">
                    <label className="form-label">{c.formLabels.email}</label>
                    <input className="form-input" type="email" required value={formState.email}
                onChange={(e) => setFormState({ ...formState, email: e.target.value })} />
                  </div>
                  <div className="form-group">
                    <label className="form-label">{c.formLabels.message}</label>
                    <textarea className="form-textarea" required value={formState.message}
                onChange={(e) => setFormState({ ...formState, message: e.target.value })} />
                  </div>
                  <button type="submit" className="btn-primary" style={{ width: '100%', padding: '13px' }}>
                    {c.formLabels.send}
                  </button>
                </form>
              </>
          }
          </div>
        </div>
      }

      {/* TWEAKS */}
      {showTweaks &&
      <div className="tweaks-panel">
          <div className="tweaks-title">Tweaks</div>
          <div className="tweak-row">
            <div className="tweak-label">Cor de destaque</div>
            <div className="tweak-options">
              {[
            { label: 'Azul', val: '#2351d4' },
            { label: 'Índigo', val: '#5c3ec7' },
            { label: 'Verde', val: '#1a6b47' },
            { label: 'Cinza', val: '#444441' }].
            map((opt) =>
            <button key={opt.val} className={`tweak-opt ${tweaks.accentColor === opt.val ? 'active' : ''}`}
            onClick={() => updateTweak('accentColor', opt.val)}>{opt.label}</button>
            )}
            </div>
          </div>
          <div className="tweak-row">
            <div className="tweak-label">Tamanho do texto</div>
            <div className="tweak-options">
              {['small', 'normal', 'large'].map((s) =>
            <button key={s} className={`tweak-opt ${tweaks.fontSize === s ? 'active' : ''}`}
            onClick={() => updateTweak('fontSize', s)}>{s}</button>
            )}
            </div>
          </div>
        </div>
      }

      <style>{`
        @media print {
          .sidebar, .hero-actions, .tweaks-panel { display: none !important; }
          .main { margin-left: 0 !important; padding: 20px !important; }
          .panel { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
          .dashboard-grid { grid-template-columns: 1fr 1fr; }
        }
      `}</style>
    </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
